<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emplify Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: 'Inter', sans-serif;
}

/* Animation */
.fade-in {
    animation: fadeIn 1s ease forwards;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

/* Particles */
.particle {
    position: absolute;
    border-radius: 999px;
    opacity: 0.25;
}

/* Animations */
.particle:nth-child(1) { animation: float1 6s infinite ease-in-out; }
.particle:nth-child(2) { animation: float2 8s infinite ease-in-out; }
.particle:nth-child(3) { animation: float3 7s infinite ease-in-out; }
.particle:nth-child(4) { animation: float1 9s infinite ease-in-out; }
.particle:nth-child(5) { animation: float2 6s infinite ease-in-out; }
.particle:nth-child(6) { animation: float3 8s infinite ease-in-out; }
.particle:nth-child(7) { animation: float1 7s infinite ease-in-out; }
.particle:nth-child(8) { animation: float2 9s infinite ease-in-out; }
.particle:nth-child(9) { animation: float3 6s infinite ease-in-out; }
.particle:nth-child(10){ animation: float1 8s infinite ease-in-out; }

@keyframes float1 {
    0%,100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-25px) translateX(10px); }
}
@keyframes float2 {
    0%,100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-15px) translateX(-10px); }
}
@keyframes float3 {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
}
</style>

</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-700 via-blue-600 to-cyan-500 p-4 overflow-y-auto scroll-smooth">

<!-- Floating Particles -->
<div class="particle w-3 h-3 bg-white top-10 left-10"></div>
<div class="particle w-2 h-2 bg-white top-1/2 left-20"></div>
<div class="particle w-4 h-4 bg-white bottom-10 right-10"></div>
<div class="particle w-2 h-2 bg-cyan-200 top-20 right-20"></div>
<div class="particle w-3 h-3 bg-indigo-200 bottom-32 left-16"></div>
<div class="particle w-1.5 h-1.5 bg-white top-1/3 right-1/4"></div>
<div class="particle w-2 h-2 bg-blue-200 bottom-1/4 left-1/3"></div>
<div class="particle w-3 h-3 bg-white top-3/4 right-10"></div>
<div class="particle w-2 h-2 bg-cyan-100 top-1/4 left-1/2"></div>
<div class="particle w-1.5 h-1.5 bg-indigo-100 bottom-20 right-1/3"></div>

<!-- Wrapper -->
<div class="min-h-screen flex items-center justify-center">

<!-- Main Card -->
<div class="fade-in w-full max-w-5xl my-6 md:my-0 bg-white/20 backdrop-blur-2xl rounded-3xl shadow-[0_20px_60px_rgba(0,0,0,0.3)] overflow-hidden flex flex-col md:flex-row border border-white/30">

    <!-- LEFT -->
    <div class="relative w-full md:w-1/2 flex flex-col justify-center items-center p-10 text-white">
        <div class="absolute inset-0 bg-gradient-to-br from-[#0f172a] via-[#1e40af] to-[#06b6d4]"></div>

        <div class="absolute w-72 h-72 bg-indigo-500/20 rounded-full blur-3xl top-[-50px] left-[-50px]"></div>
        <div class="absolute w-72 h-72 bg-cyan-400/20 rounded-full blur-3xl bottom-[-50px] right-[-50px]"></div>

        <div class="relative z-10 text-center">
            <div class="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center mb-6 shadow-xl border border-white/30 mx-auto">
                <i class="fas fa-bolt text-3xl"></i>
            </div>

            <h1 class="text-3xl font-extrabold mb-3 bg-gradient-to-r from-cyan-200 via-white to-blue-300 bg-clip-text text-transparent">
                Emplify
            </h1>

            <p class="text-sm text-blue-100 mb-6">
                Smart employee management with powerful insights
            </p>

            <div class="space-y-3 text-sm text-white/90">
                <div><i class="fas fa-check-circle text-green-300"></i> Attendance Tracking</div>
                <div><i class="fas fa-check-circle text-green-300"></i> Leave Management</div>
                <div><i class="fas fa-check-circle text-green-300"></i> Reports & Analytics</div>
            </div>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="w-full md:w-1/2 flex items-center justify-center p-6 md:p-12">

        <div class="w-full max-w-md bg-white/80 backdrop-blur-xl shadow-2xl rounded-3xl p-8 border border-white/40">

            <h2 class="text-3xl font-bold text-center mb-2 bg-gradient-to-r from-indigo-600 via-blue-500 to-cyan-500 bg-clip-text text-transparent">
                Welcome Back
            </h2>

            <p class="text-gray-500 text-center mb-6 text-sm">Login to your account</p>

            <form action="login.php" method="POST" class="space-y-6">

                <!-- Username -->
                <div class="relative flex items-center border border-gray-300 rounded-lg focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200">
                    <i class="fas fa-user text-gray-400 px-3"></i>
                    <input type="text" name="username" required
                        class="w-full py-3 pr-4 bg-transparent outline-none"
                        placeholder="Username">
                </div>

                <!-- Password -->
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>

                    <input type="password" id="password" name="password" required
                        class="w-full border border-gray-300 rounded-lg pl-10 pr-10 py-3 bg-transparent focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none"
                        placeholder="Password">

                    <i id="togglePassword"
                       class="fas fa-eye absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 cursor-pointer hover:text-indigo-600"></i>
                </div>

                <!-- Button -->
                <button type="submit"
                    class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 via-blue-500 to-cyan-500 text-white font-semibold shadow-lg hover:shadow-cyan-400/50 hover:scale-[1.04] active:scale-95 transition-all duration-300">
                    Sign In
                </button>

            </form>

        </div>
    </div>

</div>
</div>

<!-- JS -->
<script>
const toggle = document.getElementById('togglePassword');
const password = document.getElementById('password');

toggle.addEventListener('click', () => {
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;
    toggle.classList.toggle('fa-eye');
    toggle.classList.toggle('fa-eye-slash');
});
</script>

</body>
</html>
