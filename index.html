<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emplify Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-cyan-600 to-blue-500 flex items-center justify-center p-4">

<!-- Main Card -->
<div class="w-full max-w-5xl bg-white/20 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border border-white/30">

    <!-- 🔵 LEFT SIDE -->
    <!-- 🔵 LEFT SIDE (UPGRADED) -->
<div class="relative w-full md:w-1/2 overflow-hidden flex flex-col justify-center items-center p-10 text-white">

    <!-- 🌌 Premium Gradient Background -->
<div class="absolute inset-0 bg-gradient-to-br from-[#0f172a] via-[#1e3a8a] to-[#06b6d4]"></div>

<!-- ✨ Glow Effects (fixed + improved) -->
<div class="absolute w-80 h-80 bg-indigo-500/20 rounded-full blur-3xl top-[-60px] left-[-60px] animate-pulse"></div>
<div class="absolute w-80 h-80 bg-cyan-400/20 rounded-full blur-3xl bottom-[-60px] right-[-60px]"></div>

<!-- 🔥 Extra Glow Layer -->
<div class="absolute w-60 h-60 bg-blue-400/10 rounded-full blur-2xl top-1/2 left-1/3"></div>

<!-- 🌊 Smooth Gradient Curve -->
<svg class="absolute right-0 top-0 h-full hidden md:block" viewBox="0 0 100 100" preserveAspectRatio="none">
    <defs>
        <linearGradient id="curveGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1e3a8a"/>
            <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
    </defs>
    <path d="M0,0 C70,0 30,100 100,100 L100,0 Z" fill="url(#curveGradient)"/>
</svg>

    <!-- Content -->
    <div class="relative z-10 text-center">

        <!-- Icon -->
        <div class="w-20 h-20 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center mb-6 shadow-xl border border-white/30 mx-auto">
    <i class="fas fa-bolt text-3xl"></i>
</div>

  <h1 class="text-3xl font-extrabold mb-2 leading-tight bg-gradient-to-r from-cyan-200 via-white to-blue-300 bg-clip-text text-transparent">
    Welcome to Emplify
</h1>

<p class="text-sm text-blue-100/90 mb-6 max-w-xs mx-auto">
    Smart employee management system with real-time tracking and powerful insights.
</p>

        <!-- Features -->
        <div class="space-y-3 text-sm text-white/90">

            <div class="flex items-center justify-center gap-2">
                <i class="fas fa-check-circle text-green-300"></i>
                Attendance Tracking
            </div>

            <div class="flex items-center justify-center gap-2">
                <i class="fas fa-check-circle text-green-300"></i>
                Leave Management
            </div>

            <div class="flex items-center justify-center gap-2">
                <i class="fas fa-check-circle text-green-300"></i>
                Task & Report Management
            </div>

        </div>

    </div>
</div>

    <!-- ⚪ RIGHT SIDE -->
    <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center bg-white/80 backdrop-blur-lg">

        <h2 class="text-2xl font-bold text-gray-800 mb-8 text-center">Log In</h2>

        <form action="login.php" method="POST" class="space-y-6">

            <!-- Floating Input -->
            <div class="relative">
                <input type="text" name="username" required
                    class="peer w-full border-b-2 border-gray-300 focus:border-indigo-500 outline-none py-2 bg-transparent"
                    placeholder=" ">
                <label class="absolute left-0 top-2 text-gray-500 text-sm transition-all 
                    peer-placeholder-shown:top-2 peer-placeholder-shown:text-sm
                    peer-focus:-top-3 peer-focus:text-xs peer-focus:text-indigo-500">
                    Username
                </label>
            </div>

            

            <div class="relative">
                <input type="password" id="password" name="password" required
                    class="peer w-full border-b-2 border-gray-300 focus:border-indigo-500 outline-none py-2 bg-transparent"
                    placeholder=" ">
                <label class="absolute left-0 top-2 text-gray-500 text-sm transition-all 
                    peer-placeholder-shown:top-2 peer-placeholder-shown:text-sm
                    peer-focus:-top-3 peer-focus:text-xs peer-focus:text-indigo-500">
                    Password
                </label>

                <i id="togglePassword"
                   class="fas fa-eye absolute right-2 top-2 text-gray-500 cursor-pointer"></i>
            </div>

            

            <!-- Button -->
            <button type="submit"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-blue-500 text-white font-semibold shadow-lg hover:scale-105 transition-all duration-300">
                Sign In
            </button>

        </form>

        <p class="text-xs text-gray-500 text-center mt-6">
            © 2026 Emplify. All rights reserved.
        </p>

    </div>

</div>

<!-- JS -->
<script>
const toggle = document.getElementById('togglePassword');
const password = document.getElementById('password');

toggle.addEventListener('click', () => {
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;
    toggle.classList.toggle('fa-eye');
    toggle.classList.toggle('fa-eye-slash');
});
</script>

</body>
</html>
